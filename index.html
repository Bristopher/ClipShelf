<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ClipShelf</title>
    <script>
      // Paint the last-applied theme immediately, before Vite-injected CSS
      // arrives. applyTheme() caches bg+text to localStorage on every change.
      // First run falls back to dark.
      (function () {
        try {
          var cached = JSON.parse(localStorage.getItem("gkey-theme-paint") || "null");
          var bg = (cached && cached.bg) || "#0a0a0a";
          var fg = (cached && cached.text) || "#fafafa";
          var s = document.createElement("style");
          s.id = "theme-boot-paint";
          s.textContent =
            "html,body,#root{background:" + bg + ";color:" + fg + ";margin:0;}";
          document.head.appendChild(s);
        } catch (e) {
          var s = document.createElement("style");
          s.id = "theme-boot-paint";
          s.textContent =
            "html,body,#root{background:#0a0a0a;color:#fafafa;margin:0;}";
          document.head.appendChild(s);
        }
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
