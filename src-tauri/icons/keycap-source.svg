<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="1024" height="1024">
  <!-- Gkey Mover app icon — "The Keycap". Source of truth for all generated
       icons: rasterize at 1024px, then `pnpm tauri icon` regenerates the set.
       The keycap fills the canvas edge-to-edge (no background tile) so the
       icon has the same visual mass as neighboring taskbar icons.
       Legend uses Segoe UI (weight 800): rasterize on Windows so the G renders
       with the real font. -->
  <defs>
    <linearGradient id="capTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#333c4e"/>
      <stop offset="1" stop-color="#1c222e"/>
    </linearGradient>
    <linearGradient id="blueLegend" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7db4ff"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="legendGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
  </defs>
  <!-- cap body: bottom shadow wall, then the side walls -->
  <rect x="4" y="12" width="120" height="114" rx="26" fill="#0a0d12"/>
  <rect x="4" y="4" width="120" height="116" rx="26" fill="#39434f"/>
  <!-- cap top face -->
  <rect x="14" y="12" width="100" height="92" rx="18" fill="url(#capTop)"/>
  <rect x="14.75" y="12.75" width="98.5" height="90.5" rx="17.25" fill="none" stroke="#ffffff" stroke-opacity="0.10" stroke-width="1.5"/>
  <!-- legend glow (under the crisp legend) -->
  <text x="64" y="57" text-anchor="middle" dominant-baseline="central"
        font-family="Segoe UI, Arial, sans-serif" font-weight="800" font-size="66"
        fill="#3b82f6" opacity="0.35" filter="url(#legendGlow)">G</text>
  <!-- legend -->
  <text x="64" y="57" text-anchor="middle" dominant-baseline="central"
        font-family="Segoe UI, Arial, sans-serif" font-weight="800" font-size="66"
        fill="url(#blueLegend)">G</text>
</svg>
